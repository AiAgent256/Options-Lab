name: Hourly Portfolio Snapshot

on:
  schedule:
    - cron: "0 * * * *" # every hour
  workflow_dispatch: # allow manual trigger

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger snapshot
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://v0-options-lab.vercel.app/api/cron/snapshot")
          echo "Status: $response"
          if [ "$response" -ge 400 ]; then
            echo "Snapshot failed with HTTP $response"
            exit 1
          fi
